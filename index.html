<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src https://raw.githubusercontent.com https://api.github.com; img-src 'self' data:; font-src 'self';">
<title>Prompt Library</title>
<style>
@font-face { font-family: 'DM Serif Display'; font-style: normal; font-weight: 400; font-display: swap; src: local('DM Serif Display'); }
@font-face { font-family: 'JetBrains Mono'; font-style: normal; font-weight: 400; font-display: swap; src: local('JetBrains Mono'); }

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0e0f13;
  --surface: #16171d;
  --surface-hover: #1c1d25;
  --surface-active: #22232d;
  --border: #2a2b36;
  --border-light: #343542;
  --text: #e8e6e1;
  --text-secondary: #9b9a97;
  --text-muted: #5e5d5a;
  --accent: #c8a46e;
  --accent-dim: #a08450;
  --accent-glow: rgba(200, 164, 110, 0.1);
  --danger: #c06060;
  --danger-bg: rgba(192, 96, 96, 0.1);
  --success: #60a060;
  --success-bg: rgba(96, 160, 96, 0.1);
  --tag-bg: rgba(200, 164, 110, 0.08);
  --tag-border: rgba(200, 164, 110, 0.2);
  --radius: 8px;
  --radius-lg: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.3);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  --font-display: 'DM Serif Display', Georgia, 'Times New Roman', serif;
  --font-body: 'DM Sans', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --font-mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(200,164,110,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 80%, rgba(100,80,60,0.03) 0%, transparent 50%);
  pointer-events: none;
  z-index: 0;
}

.app { position: relative; z-index: 1; }

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 40px; border-bottom: 1px solid var(--border);
  backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100;
  background: rgba(14,15,19,0.85);
}

.logo { display: flex; align-items: center; gap: 14px; }
.logo-icon {
  width: 38px; height: 38px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent-dim));
  display: grid; place-items: center; font-size: 18px; color: var(--bg);
  font-weight: 700; font-family: var(--font-mono);
  box-shadow: 0 2px 12px rgba(200,164,110,0.25);
}
.logo h1 { font-family: var(--font-display); font-size: 22px; font-weight: 400; letter-spacing: 0.5px; }
.logo h1 span { color: var(--accent); }

.header-actions { display: flex; gap: 10px; align-items: center; }

.role-badge {
  font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
  padding: 4px 12px; border-radius: 20px; display: flex; align-items: center; gap: 6px;
}
.role-badge.admin { background: var(--accent-glow); color: var(--accent); border: 1px solid var(--tag-border); }
.role-badge.visitor { background: rgba(255,255,255,0.04); color: var(--text-muted); border: 1px solid var(--border); }

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 9px 18px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text); font-family: var(--font-body);
  font-size: 13.5px; font-weight: 500; cursor: pointer;
  transition: all var(--transition); white-space: nowrap;
}
.btn:hover { background: var(--surface-hover); border-color: var(--border-light); }
.btn svg { width: 16px; height: 16px; }
.btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent-dim)); border-color: var(--accent); color: var(--bg); font-weight: 600; }
.btn-primary:hover { opacity: 0.9; box-shadow: 0 2px 16px rgba(200,164,110,0.3); }
.btn-danger { color: var(--danger); }
.btn-danger:hover { background: var(--danger-bg); border-color: var(--danger); }
.btn-sm { padding: 6px 12px; font-size: 12.5px; }
.btn-ghost { border-color: transparent; background: transparent; }
.btn-ghost:hover { background: var(--surface); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

.main { display: grid; grid-template-columns: 260px 1fr; min-height: calc(100vh - 73px); }

.sidebar { border-right: 1px solid var(--border); padding: 20px 0; display: flex; flex-direction: column; overflow-y: auto; }
.sidebar-title {
  font-size: 10.5px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--text-muted); padding: 8px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.sidebar-title button { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 2px; border-radius: 4px; display: grid; place-items: center; transition: all var(--transition); }
.sidebar-title button:hover { color: var(--accent); background: var(--accent-glow); }

.cat-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 16px;
  cursor: pointer; transition: all var(--transition); font-size: 14px;
  color: var(--text-secondary); position: relative;
}
.cat-item:hover { background: var(--surface); color: var(--text); }
.cat-item.active { color: var(--accent); background: var(--accent-glow); }
.cat-item.active::before { content:''; position:absolute; left:0; top:4px; bottom:4px; width:3px; background:var(--accent); border-radius:0 3px 3px 0; }
.cat-item .count { margin-left:auto; font-size:11px; color:var(--text-muted); background:var(--surface); padding:2px 7px; border-radius:10px; font-weight:500; }
.cat-item.active .count { background:rgba(200,164,110,0.15); color:var(--accent); }

.cat-actions { display:none; gap:2px; margin-left:auto; }
.cat-item:hover .cat-actions { display:flex; }
.cat-item:hover .count { display:none; }
.cat-actions button { background:none; border:none; color:var(--text-muted); cursor:pointer; padding:3px; border-radius:4px; display:grid; place-items:center; }
.cat-actions button:hover { color:var(--accent); background:var(--accent-glow); }
.cat-actions button.del:hover { color:var(--danger); background:var(--danger-bg); }
.cat-actions button svg { width:14px; height:14px; }

.content { padding: 28px 36px; overflow-y: auto; }
.content-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; gap:16px; flex-wrap:wrap; }
.content-header h2 { font-family:var(--font-display); font-size:26px; font-weight:400; }

.search-box { position:relative; width:280px; }
.search-box input { width:100%; padding:9px 14px 9px 38px; border-radius:var(--radius); border:1px solid var(--border); background:var(--surface); color:var(--text); font-family:var(--font-body); font-size:13.5px; outline:none; transition:all var(--transition); }
.search-box input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
.search-box input::placeholder { color:var(--text-muted); }
.search-box svg { position:absolute; left:12px; top:50%; transform:translateY(-50%); width:16px; height:16px; color:var(--text-muted); }

.prompts-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(340px, 1fr)); gap:16px; }

.prompt-card {
  background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg);
  padding:22px; cursor:pointer; transition:all var(--transition);
  display:flex; flex-direction:column; gap:12px;
}
.prompt-card:hover { border-color:var(--border-light); background:var(--surface-hover); transform:translateY(-2px); box-shadow:var(--shadow); }

.prompt-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.prompt-card h3 { font-size:15.5px; font-weight:600; line-height:1.4; }
.prompt-card .desc { font-size:13.5px; color:var(--text-secondary); line-height:1.6; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
.prompt-card .tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:auto; }
.tag { font-size:11.5px; padding:3px 10px; border-radius:20px; background:var(--tag-bg); border:1px solid var(--tag-border); color:var(--accent); font-weight:500; }
.tag-plain { background:rgba(255,255,255,0.03); border-color:var(--border); color:var(--text-secondary); }

.prompt-card-actions { display:flex; gap:2px; opacity:0; transition:opacity var(--transition); }
.prompt-card:hover .prompt-card-actions { opacity:1; }
.prompt-card-actions button { background:none; border:none; color:var(--text-muted); cursor:pointer; padding:4px; border-radius:4px; }
.prompt-card-actions button:hover { color:var(--accent); background:var(--accent-glow); }
.prompt-card-actions button.del:hover { color:var(--danger); background:var(--danger-bg); }
.prompt-card-actions button svg { width:15px; height:15px; }

.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); backdrop-filter:blur(8px); z-index:200; display:grid; place-items:center; padding:20px; opacity:0; pointer-events:none; transition:opacity 0.25s ease; }
.modal-overlay.active { opacity:1; pointer-events:all; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); width:100%; max-width:620px; max-height:85vh; overflow-y:auto; box-shadow:0 24px 64px rgba(0,0,0,0.5); transform:translateY(10px) scale(0.98); transition:transform 0.25s ease; }
.modal-overlay.active .modal { transform:translateY(0) scale(1); }
.modal-header { display:flex; align-items:center; justify-content:space-between; padding:20px 24px; border-bottom:1px solid var(--border); }
.modal-header h3 { font-family:var(--font-display); font-size:20px; font-weight:400; }
.modal-close { background:none; border:none; color:var(--text-muted); cursor:pointer; padding:6px; border-radius:6px; display:grid; place-items:center; transition:all var(--transition); }
.modal-close:hover { color:var(--text); background:var(--surface-hover); }
.modal-close svg { width:20px; height:20px; }
.modal-body { padding:24px; display:flex; flex-direction:column; gap:18px; }
.modal-footer { display:flex; justify-content:flex-end; gap:10px; padding:16px 24px; border-top:1px solid var(--border); }

.field label { display:block; font-size:12.5px; font-weight:600; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); margin-bottom:8px; }
.field input, .field select, .field textarea { width:100%; padding:10px 14px; border-radius:var(--radius); border:1px solid var(--border); background:var(--bg); color:var(--text); font-family:var(--font-body); font-size:14px; outline:none; transition:all var(--transition); }
.field input:focus, .field select:focus, .field textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
.field textarea { min-height:180px; resize:vertical; font-family:var(--font-mono); font-size:13px; line-height:1.7; }
.field input::placeholder, .field textarea::placeholder { color:var(--text-muted); }
.field select { cursor:pointer; }
.field select option { background:var(--surface); }
.field small { display:block; color:var(--text-muted); font-size:11.5px; margin-top:6px; line-height:1.5; }

.detail-content { padding:24px; }
.detail-content h2 { font-family:var(--font-display); font-size:24px; font-weight:400; margin-bottom:12px; }
.detail-meta { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:20px; }
.detail-prompt-text { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius); padding:18px; font-family:var(--font-mono); font-size:13px; line-height:1.8; color:var(--text-secondary); white-space:pre-wrap; word-break:break-word; position:relative; }
.copy-btn { position:absolute; top:10px; right:10px; }

.admin-panel { margin-top:auto; padding:16px; border-top:1px solid var(--border); }
.admin-panel summary { font-size:12px; color:var(--text-muted); cursor:pointer; padding:4px 0; list-style:none; display:flex; align-items:center; gap:6px; }
.admin-panel summary::-webkit-details-marker { display:none; }
.admin-panel summary svg { width:14px; height:14px; }
.admin-panel .admin-fields { padding-top:12px; display:flex; flex-direction:column; gap:10px; }
.admin-panel input { width:100%; padding:8px 10px; border-radius:var(--radius); border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:12.5px; font-family:var(--font-body); outline:none; }
.admin-panel input:focus { border-color:var(--accent); }
.admin-panel input::placeholder { color:var(--text-muted); }

.spinner { width:16px; height:16px; border:2px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.6s linear infinite; display:inline-block; }
@keyframes spin { to { transform:rotate(360deg); } }
.loading-overlay { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 20px; gap:16px; color:var(--text-muted); }
.loading-overlay .spinner { width:28px; height:28px; border-width:3px; }
.empty-state { text-align:center; padding:80px 20px; color:var(--text-muted); }
.empty-state svg { width:48px; height:48px; margin-bottom:16px; opacity:0.4; }
.empty-state h3 { font-size:18px; margin-bottom:8px; color:var(--text-secondary); }
.empty-state p { font-size:14px; margin-bottom:24px; }

.toast-container { position:fixed; bottom:24px; right:24px; z-index:400; display:flex; flex-direction:column; gap:8px; }
.toast { padding:12px 20px; border-radius:var(--radius); background:var(--surface-active); border:1px solid var(--border); color:var(--text); font-size:13.5px; box-shadow:var(--shadow); animation:toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards; display:flex; align-items:center; gap:8px; max-width:380px; }
.toast.success { border-color:var(--success); }
.toast.error { border-color:var(--danger); }
@keyframes toastIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes toastOut { to { opacity:0; transform:translateY(10px); } }

@media (max-width: 768px) {
  .main { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  .header { padding: 16px 20px; flex-wrap: wrap; gap: 10px; }
  .content { padding: 20px; }
  .prompts-grid { grid-template-columns: 1fr; }
  .content-header { flex-direction: column; align-items: stretch; }
  .search-box { width: 100%; }
}
</style>
</head>
<body>

<div class="app" id="app">
  <header class="header">
    <div class="logo">
      <div class="logo-icon">P</div>
      <h1>Prompt <span>Library</span></h1>
    </div>
    <div class="header-actions">
      <div id="roleBadge"></div>
      <button class="btn btn-primary" id="newPromptBtn" style="display:none;" onclick="openNewPrompt()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Prompt
      </button>
    </div>
  </header>

  <div class="main">
    <aside class="sidebar">
      <div class="sidebar-title">
        Categories
        <button id="addCatBtn" style="display:none;" onclick="openNewCategory()" title="Add category">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
      </div>
      <div id="categoryList"></div>

      <div class="admin-panel">
        <details id="adminDetails">
          <summary>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <span id="adminToggleLabel">Admin login</span>
          </summary>
          <div class="admin-fields" id="adminFields">
            <input type="password" id="adminToken" placeholder="GitHub token (ghp_...)" autocomplete="off" />
            <button class="btn btn-primary btn-sm" onclick="adminLogin()" style="width:100%;justify-content:center;">Unlock admin</button>
            <div style="font-size:10.5px;color:var(--text-muted);line-height:1.5;">
              Token is kept in memory only — closing the tab erases it. Needs Contents read/write on this repo.
            </div>
          </div>
          <div id="adminLoggedIn" style="display:none;padding-top:12px;">
            <div style="font-size:12px;color:var(--success);margin-bottom:8px;display:flex;align-items:center;gap:6px;">
              <span style="width:6px;height:6px;border-radius:50%;background:var(--success);display:inline-block;"></span>
              Connected as admin
            </div>
            <button class="btn btn-sm btn-danger" onclick="adminLogout()" style="width:100%;justify-content:center;">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Disconnect
            </button>
          </div>
        </details>
      </div>
    </aside>

    <section class="content">
      <div class="content-header">
        <h2 id="contentTitle">All Prompts</h2>
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" placeholder="Search prompts…" id="searchInput" oninput="renderPrompts()" />
        </div>
      </div>
      <div id="promptsGrid" class="prompts-grid"></div>
    </section>
  </div>
</div>

<!-- Admin: Prompt Create/Edit -->
<div class="modal-overlay" id="promptModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="promptModalTitle">New Prompt</h3>
      <button class="modal-close" onclick="closeModal('promptModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Title</label><input type="text" id="promptTitle" placeholder="e.g. Code Review Assistant" maxlength="200" /></div>
      <div class="field"><label>Category</label><select id="promptCategory"></select></div>
      <div class="field"><label>Tags (comma separated)</label><input type="text" id="promptTags" placeholder="e.g. coding, review, quality" maxlength="500" /></div>
      <div class="field"><label>Prompt</label><textarea id="promptText" placeholder="Write your prompt here…" maxlength="50000"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('promptModal')">Cancel</button>
      <button class="btn btn-primary" id="promptSaveBtn" onclick="savePrompt()">Save Prompt</button>
    </div>
  </div>
</div>

<!-- Admin: Category -->
<div class="modal-overlay" id="categoryModal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <h3 id="categoryModalTitle">New Category</h3>
      <button class="modal-close" onclick="closeModal('categoryModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="field"><label>Category Name</label><input type="text" id="categoryName" placeholder="e.g. Writing" maxlength="50" /></div>
      <div class="field"><label>Emoji Icon</label><input type="text" id="categoryIcon" placeholder="e.g. ✍️" maxlength="4" style="width:80px;" /></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('categoryModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveCategory()">Save</button>
    </div>
  </div>
</div>

<!-- Detail View -->
<div class="modal-overlay" id="detailModal">
  <div class="modal" style="max-width:680px;">
    <div class="modal-header">
      <h3 style="font-size:16px;color:var(--text-secondary);">Prompt Detail</h3>
      <button class="modal-close" onclick="closeModal('detailModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="detail-content" id="detailContent"></div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ════════════════════════════════════════════════════════════
//  CONFIGURATION — UPDATE THESE FOR YOUR REPO
// ════════════════════════════════════════════════════════════
const REPO_OWNER = 'YOUR_USERNAME';
const REPO_NAME  = 'YOUR_REPO_NAME';
const BRANCH     = 'main';
// ════════════════════════════════════════════════════════════

const RAW_BASE = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}`;
const API_BASE = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}`;

// ===== STATE (memory-only, never persisted) =====
let adminConfig = null;
let categories = [];
let prompts = [];
let activeCategory = 'all';
let editingPromptId = null;
let editingCategoryOld = null;

function isAdmin() { return !!adminConfig; }

// ===== SECURITY: Schema validation =====
function validatePrompt(p) {
  if (!p || typeof p !== 'object') return false;
  if (typeof p.id !== 'string' || p.id.length > 100) return false;
  if (typeof p.title !== 'string' || p.title.length === 0 || p.title.length > 200) return false;
  if (typeof p.category !== 'string' || p.category.length > 50) return false;
  if (typeof p.text !== 'string' || p.text.length === 0 || p.text.length > 50000) return false;
  if (p.tags && (!Array.isArray(p.tags) || p.tags.some(t => typeof t !== 'string' || t.length > 50))) return false;
  if (p.tags && p.tags.length > 20) return false;
  return true;
}

function validateCategory(c) {
  if (!c || typeof c !== 'object') return false;
  if (typeof c.name !== 'string' || c.name.length === 0 || c.name.length > 50) return false;
  if (typeof c.icon !== 'string' || c.icon.length > 8) return false;
  return true;
}

// ===== SECURITY: Safe text node creation (no innerHTML) =====
function safeText(str) {
  return document.createTextNode(String(str));
}

function el(tag, attrs, children) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k, v]) => {
    if (k === 'onclick') e.addEventListener('click', v);
    else if (k === 'className') e.className = v;
    else if (k === 'textContent') e.textContent = v;
    else e.setAttribute(k, v);
  });
  if (children) {
    (Array.isArray(children) ? children : [children]).forEach(c => {
      if (typeof c === 'string') e.appendChild(safeText(c));
      else if (c) e.appendChild(c);
    });
  }
  return e;
}

function svgIcon(paths, w = 16, h = 16) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('viewBox', '0 0 24 24');
  svg.setAttribute('fill', 'none');
  svg.setAttribute('stroke', 'currentColor');
  svg.setAttribute('stroke-width', '2');
  svg.setAttribute('width', String(w));
  svg.setAttribute('height', String(h));
  paths.forEach(d => {
    const p = document.createElementNS(ns, typeof d === 'object' ? d.tag : 'path');
    if (typeof d === 'object') Object.entries(d).forEach(([k, v]) => { if (k !== 'tag') p.setAttribute(k, v); });
    else p.setAttribute('d', d);
    svg.appendChild(p);
  });
  return svg;
}

// ===== PUBLIC READ =====
async function fetchPublicJSON(path) {
  const res = await fetch(`${RAW_BASE}/${path}?t=${Date.now()}`);
  if (!res.ok) return null;
  const text = await res.text();
  try { return JSON.parse(text); }
  catch(e) { return null; }
}

async function loadPublicData() {
  const grid = document.getElementById('promptsGrid');
  grid.textContent = '';
  const loader = el('div', { className: 'loading-overlay', style: 'grid-column:1/-1;' }, [
    el('div', { className: 'spinner' }),
    'Loading prompts…'
  ]);
  grid.appendChild(loader);

  try {
    const [cats, idx] = await Promise.all([
      fetchPublicJSON('prompts/categories.json'),
      fetchPublicJSON('prompts/index.json')
    ]);

    // Validate categories
    if (Array.isArray(cats)) {
      categories = cats.filter(validateCategory);
    } else {
      categories = [{ name: 'General', icon: '📋' }];
    }

    // Validate prompts
    if (Array.isArray(idx)) {
      prompts = idx.filter(validatePrompt);
    } else {
      prompts = [];
    }
  } catch(e) {
    categories = [{ name: 'General', icon: '📋' }];
    prompts = [];
    toast('Could not load prompts — is the repo public?', 'error');
  }

  renderCategories();
  renderPrompts();
}

// ===== ADMIN WRITE =====
function ghAPI(path, opts = {}) {
  return fetch(`${API_BASE}/contents/${path}`, {
    ...opts,
    headers: {
      'Authorization': `Bearer ${adminConfig.token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json',
      ...opts.headers
    }
  });
}

async function getFileSHA(path) {
  try {
    const res = await ghAPI(path + '?t=' + Date.now());
    if (res.ok) return (await res.json()).sha;
  } catch(e) {}
  return null;
}

async function writeFile(path, content, message) {
  const body = { message, content: btoa(unescape(encodeURIComponent(content))), branch: BRANCH };
  const sha = await getFileSHA(path);
  if (sha) body.sha = sha;
  const res = await ghAPI(path, { method: 'PUT', body: JSON.stringify(body) });
  if (!res.ok) throw new Error((await res.json()).message || 'Write failed');
  return res.json();
}

async function deleteGHFile(path, message) {
  const sha = await getFileSHA(path);
  if (!sha) return;
  const res = await ghAPI(path, { method: 'DELETE', body: JSON.stringify({ message, sha, branch: BRANCH }) });
  if (!res.ok) throw new Error('Delete failed');
}

async function saveCategoriesToRepo() { await writeFile('prompts/categories.json', JSON.stringify(categories, null, 2), 'Update categories'); }
async function saveIndexToRepo() { await writeFile('prompts/index.json', JSON.stringify(prompts, null, 2), 'Update prompt index'); }

// ===== ADMIN LOGIN/LOGOUT =====
async function adminLogin() {
  const token = document.getElementById('adminToken').value.trim();
  if (!token) { toast('Enter your GitHub token', 'error'); return; }

  // Validate token format
  if (!/^(ghp_|github_pat_)[A-Za-z0-9_]+$/.test(token)) {
    toast('Invalid token format', 'error');
    return;
  }

  try {
    const res = await fetch(API_BASE, { headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3+json' } });
    if (!res.ok) throw new Error('Invalid token or no repo access');
    const data = await res.json();
    if (!data.permissions || !data.permissions.push) {
      toast('Token needs write (push) access', 'error');
      return;
    }
  } catch(e) { toast('Auth failed: ' + e.message, 'error'); return; }

  adminConfig = Object.freeze({ token });
  document.getElementById('adminFields').style.display = 'none';
  document.getElementById('adminLoggedIn').style.display = 'block';
  document.getElementById('adminToggleLabel').textContent = 'Admin';
  updateUIForRole();
  toast('Admin mode activated', 'success');
}

function adminLogout() {
  adminConfig = null;
  document.getElementById('adminFields').style.display = 'flex';
  document.getElementById('adminLoggedIn').style.display = 'none';
  document.getElementById('adminToggleLabel').textContent = 'Admin login';
  document.getElementById('adminToken').value = '';
  updateUIForRole();
  toast('Disconnected', 'success');
}

function updateUIForRole() {
  const badge = document.getElementById('roleBadge');
  badge.textContent = '';
  const span = el('span', { className: isAdmin() ? 'role-badge admin' : 'role-badge visitor', textContent: isAdmin() ? '🔑 Admin' : '👁 Visitor' });
  badge.appendChild(span);

  document.getElementById('newPromptBtn').style.display = isAdmin() ? 'inline-flex' : 'none';
  document.getElementById('addCatBtn').style.display = isAdmin() ? 'block' : 'none';
  renderCategories();
  renderPrompts();
}

// ===== RENDER (DOM-based, no innerHTML) =====
function renderCategories() {
  const container = document.getElementById('categoryList');
  container.textContent = '';

  // All item
  const allCount = prompts.length;
  const allItem = el('div', { className: 'cat-item' + (activeCategory === 'all' ? ' active' : ''), onclick: () => selectCategory('all') }, [
    el('span', null, '📚'), ' All Prompts ',
    el('span', { className: 'count', textContent: String(allCount) })
  ]);
  container.appendChild(allItem);

  categories.forEach(cat => {
    const count = prompts.filter(p => p.category === cat.name).length;
    const item = el('div', { className: 'cat-item' + (activeCategory === cat.name ? ' active' : ''), onclick: () => selectCategory(cat.name) }, [
      el('span', null, cat.icon), ' ' + cat.name + ' ',
      el('span', { className: 'count', textContent: String(count) })
    ]);

    if (isAdmin()) {
      const actions = el('span', { className: 'cat-actions' });
      const editBtn = el('button', { title: 'Edit', onclick: (e) => { e.stopPropagation(); editCategory(cat.name); } });
      editBtn.appendChild(svgIcon([{tag:'path',d:'M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7'},{tag:'path',d:'M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z'}], 14, 14));
      const delBtn = el('button', { className: 'del', title: 'Delete', onclick: (e) => { e.stopPropagation(); deleteCategory(cat.name); } });
      delBtn.appendChild(svgIcon([{tag:'polyline',points:'3 6 5 6 21 6'},{tag:'path',d:'M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m5-3h4a1 1 0 0 1 1 1v1H9V4a1 1 0 0 1 1-1z'}], 14, 14));
      actions.appendChild(editBtn);
      actions.appendChild(delBtn);
      item.appendChild(actions);
    }

    container.appendChild(item);
  });

  populateCategorySelect();
}

function renderPrompts() {
  const grid = document.getElementById('promptsGrid');
  grid.textContent = '';
  const search = document.getElementById('searchInput').value.toLowerCase();
  let filtered = prompts;

  if (activeCategory !== 'all') filtered = filtered.filter(p => p.category === activeCategory);
  if (search) filtered = filtered.filter(p =>
    p.title.toLowerCase().includes(search) ||
    p.text.toLowerCase().includes(search) ||
    (p.tags || []).some(t => t.toLowerCase().includes(search))
  );

  document.getElementById('contentTitle').textContent = activeCategory === 'all' ? 'All Prompts' : activeCategory;

  if (filtered.length === 0) {
    const empty = el('div', { className: 'empty-state', style: 'grid-column:1/-1;' });
    empty.appendChild(svgIcon([{tag:'rect',x:'2',y:'3',width:'20',height:'18',rx:'2'},{tag:'line',x1:'8',y1:'9',x2:'16',y2:'9'},{tag:'line',x1:'8',y1:'13',x2:'12',y2:'13'}], 48, 48));
    empty.appendChild(el('h3', null, 'No prompts yet'));
    empty.appendChild(el('p', null, isAdmin() ? 'Create your first prompt to get started.' : 'The library is empty.'));
    if (isAdmin()) {
      const btn = el('button', { className: 'btn btn-primary', onclick: openNewPrompt, textContent: 'New Prompt' });
      empty.appendChild(btn);
    }
    grid.appendChild(empty);
    return;
  }

  filtered.forEach(p => {
    const card = el('div', { className: 'prompt-card', onclick: () => viewPrompt(p.id) });
    const top = el('div', { className: 'prompt-card-top' });
    top.appendChild(el('h3', null, p.title));

    if (isAdmin()) {
      const actions = el('div', { className: 'prompt-card-actions' });
      const editBtn = el('button', { title: 'Edit', onclick: (e) => { e.stopPropagation(); editPrompt(p.id); } });
      editBtn.appendChild(svgIcon([{tag:'path',d:'M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7'},{tag:'path',d:'M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z'}], 15, 15));
      const delBtn = el('button', { className: 'del', title: 'Delete', onclick: (e) => { e.stopPropagation(); deletePrompt(p.id); } });
      delBtn.appendChild(svgIcon([{tag:'polyline',points:'3 6 5 6 21 6'},{tag:'path',d:'M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6m5-3h4a1 1 0 0 1 1 1v1H9V4a1 1 0 0 1 1-1z'}], 15, 15));
      actions.appendChild(editBtn);
      actions.appendChild(delBtn);
      top.appendChild(actions);
    }

    card.appendChild(top);
    card.appendChild(el('div', { className: 'desc', textContent: p.text }));

    const tags = el('div', { className: 'tags' });
    tags.appendChild(el('span', { className: 'tag', textContent: p.category }));
    (p.tags || []).forEach(t => tags.appendChild(el('span', { className: 'tag tag-plain', textContent: t })));
    card.appendChild(tags);

    grid.appendChild(card);
  });
}

function selectCategory(name) { activeCategory = name; renderCategories(); renderPrompts(); }

function populateCategorySelect() {
  const sel = document.getElementById('promptCategory');
  if (!sel) return;
  sel.textContent = '';
  categories.forEach(c => {
    sel.appendChild(el('option', { value: c.name, textContent: c.icon + ' ' + c.name }));
  });
}

// ===== ADMIN: PROMPT CRUD =====
function openNewPrompt() {
  if (!isAdmin()) return;
  editingPromptId = null;
  document.getElementById('promptModalTitle').textContent = 'New Prompt';
  document.getElementById('promptTitle').value = '';
  document.getElementById('promptTags').value = '';
  document.getElementById('promptText').value = '';
  document.getElementById('promptSaveBtn').textContent = 'Save Prompt';
  populateCategorySelect();
  if (activeCategory !== 'all') document.getElementById('promptCategory').value = activeCategory;
  openModal('promptModal');
}

function editPrompt(id) {
  if (!isAdmin()) return;
  const p = prompts.find(x => x.id === id);
  if (!p) return;
  editingPromptId = id;
  document.getElementById('promptModalTitle').textContent = 'Edit Prompt';
  document.getElementById('promptTitle').value = p.title;
  document.getElementById('promptTags').value = (p.tags || []).join(', ');
  document.getElementById('promptText').value = p.text;
  document.getElementById('promptSaveBtn').textContent = 'Update Prompt';
  populateCategorySelect();
  document.getElementById('promptCategory').value = p.category;
  openModal('promptModal');
}

async function savePrompt() {
  if (!isAdmin()) return;
  const title = document.getElementById('promptTitle').value.trim();
  const category = document.getElementById('promptCategory').value;
  const tags = document.getElementById('promptTags').value.split(',').map(t => t.trim()).filter(Boolean).slice(0, 20);
  const text = document.getElementById('promptText').value.trim();

  if (!title || !text) { toast('Title and prompt text are required', 'error'); return; }
  if (title.length > 200) { toast('Title too long (max 200 chars)', 'error'); return; }

  const btn = document.getElementById('promptSaveBtn');
  btn.innerHTML = ''; btn.appendChild(el('span', { className: 'spinner' })); btn.appendChild(safeText(' Saving…'));
  btn.disabled = true;

  try {
    const id = editingPromptId || 'prompt_' + Date.now();
    const slug = id.replace(/[^a-z0-9_]/gi, '_');
    const data = { id, title, category, tags, text, updatedAt: new Date().toISOString() };

    if (!validatePrompt(data)) { toast('Invalid prompt data', 'error'); return; }

    await writeFile(`prompts/${slug}.json`, JSON.stringify(data, null, 2), editingPromptId ? `Update: ${title}` : `Add: ${title}`);
    const idx = prompts.findIndex(p => p.id === id);
    if (idx >= 0) prompts[idx] = data; else prompts.unshift(data);
    await saveIndexToRepo();
    renderCategories(); renderPrompts();
    closeModal('promptModal');
    toast(editingPromptId ? 'Prompt updated!' : 'Prompt created!', 'success');
  } catch(e) { toast('Error: ' + e.message, 'error'); }

  btn.textContent = editingPromptId ? 'Update Prompt' : 'Save Prompt'; btn.disabled = false;
}

async function deletePrompt(id) {
  if (!isAdmin() || !confirm('Delete this prompt?')) return;
  try {
    await deleteGHFile(`prompts/${id.replace(/[^a-z0-9_]/gi, '_')}.json`, `Delete: ${id}`);
    prompts = prompts.filter(p => p.id !== id);
    await saveIndexToRepo();
    renderCategories(); renderPrompts();
    closeModal('detailModal');
    toast('Prompt deleted', 'success');
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

// ===== ADMIN: CATEGORY CRUD =====
function openNewCategory() {
  if (!isAdmin()) return;
  editingCategoryOld = null;
  document.getElementById('categoryModalTitle').textContent = 'New Category';
  document.getElementById('categoryName').value = '';
  document.getElementById('categoryIcon').value = '';
  openModal('categoryModal');
}

function editCategory(name) {
  if (!isAdmin()) return;
  const cat = categories.find(c => c.name === name);
  if (!cat) return;
  editingCategoryOld = name;
  document.getElementById('categoryModalTitle').textContent = 'Edit Category';
  document.getElementById('categoryName').value = cat.name;
  document.getElementById('categoryIcon').value = cat.icon;
  openModal('categoryModal');
}

async function saveCategory() {
  if (!isAdmin()) return;
  const name = document.getElementById('categoryName').value.trim();
  const icon = document.getElementById('categoryIcon').value.trim() || '📁';
  if (!name) { toast('Name required', 'error'); return; }
  if (name.length > 50) { toast('Name too long', 'error'); return; }

  if (!validateCategory({ name, icon })) { toast('Invalid category', 'error'); return; }

  try {
    if (editingCategoryOld) {
      const idx = categories.findIndex(c => c.name === editingCategoryOld);
      if (idx >= 0) categories[idx] = { name, icon };
      prompts.forEach(p => { if (p.category === editingCategoryOld) p.category = name; });
      await saveIndexToRepo();
    } else {
      if (categories.some(c => c.name === name)) { toast('Already exists', 'error'); return; }
      categories.push({ name, icon });
    }
    await saveCategoriesToRepo();
    renderCategories(); renderPrompts();
    closeModal('categoryModal');
    toast(editingCategoryOld ? 'Updated!' : 'Created!', 'success');
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

async function deleteCategory(name) {
  if (!isAdmin()) return;
  const count = prompts.filter(p => p.category === name).length;
  if (!confirm(`Delete "${name}"? ${count} prompt(s) move to General.`)) return;
  try {
    categories = categories.filter(c => c.name !== name);
    prompts.forEach(p => { if (p.category === name) p.category = 'General'; });
    if (!categories.some(c => c.name === 'General')) categories.unshift({ name: 'General', icon: '📋' });
    await saveCategoriesToRepo(); await saveIndexToRepo();
    if (activeCategory === name) activeCategory = 'all';
    renderCategories(); renderPrompts();
    toast('Deleted', 'success');
  } catch(e) { toast('Error: ' + e.message, 'error'); }
}

// ===== DETAIL VIEW (DOM-based) =====
function viewPrompt(id) {
  const p = prompts.find(x => x.id === id);
  if (!p) return;
  const container = document.getElementById('detailContent');
  container.textContent = '';

  container.appendChild(el('h2', null, p.title));

  const meta = el('div', { className: 'detail-meta' });
  meta.appendChild(el('span', { className: 'tag', textContent: p.category }));
  (p.tags || []).forEach(t => meta.appendChild(el('span', { className: 'tag tag-plain', textContent: t })));
  container.appendChild(meta);

  const textBox = el('div', { className: 'detail-prompt-text' });
  const copyBtn = el('button', { className: 'btn btn-sm btn-ghost copy-btn', onclick: () => copyPromptText(copyBtn, p.text) });
  copyBtn.appendChild(svgIcon([{tag:'rect',x:'9',y:'9',width:'13',height:'13',rx:'2'},{tag:'path',d:'M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1'}], 14, 14));
  copyBtn.appendChild(safeText(' Copy'));
  textBox.appendChild(copyBtn);
  textBox.appendChild(safeText(p.text));
  container.appendChild(textBox);

  if (isAdmin()) {
    const actions = el('div', { style: 'margin-top:16px;display:flex;gap:8px;justify-content:flex-end;' });
    actions.appendChild(el('button', { className: 'btn btn-sm', textContent: 'Edit', onclick: () => { editPrompt(p.id); closeModal('detailModal'); } }));
    actions.appendChild(el('button', { className: 'btn btn-sm btn-danger', textContent: 'Delete', onclick: () => deletePrompt(p.id) }));
    container.appendChild(actions);
  }

  openModal('detailModal');
}

function copyPromptText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Copied!';
    setTimeout(() => {
      btn.textContent = '';
      btn.appendChild(svgIcon([{tag:'rect',x:'9',y:'9',width:'13',height:'13',rx:'2'},{tag:'path',d:'M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1'}], 14, 14));
      btn.appendChild(safeText(' Copy'));
    }, 1500);
  });
}

// ===== MODALS & UTILS =====
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('active'); });
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
});

function toast(msg, type) {
  const t = el('div', { className: 'toast ' + (type || ''), textContent: msg });
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(() => t.remove(), 3200);
}

// ===== SECURITY: Clear token on unload =====
window.addEventListener('beforeunload', () => { adminConfig = null; });
window.addEventListener('pagehide', () => { adminConfig = null; });

// ===== BOOT =====
updateUIForRole();
loadPublicData();
</script>
